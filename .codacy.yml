engines:
  # Enable specific analysis engines for .NET projects
  - checkstyle
  - detekt
  - markdownlint

exclude_paths:
  # Exclude specific paths from analysis
  - node_modules/**
  - dist/**
  - build/**
  - .vscode/**
  - bin/**
  - obj/**
  - "*.Designer.cs"
  - "*.Generated.cs"
  - "AssemblyInfo.cs"
  - tests/**/TestData/**
  - packages/**
  - .nuget/**

checkstyle:
  # Checkstyle configuration for C# (similar patterns)
  enabled: true

detekt:
  # Detekt configuration adapted for C# patterns
  enabled: true

markdownlint:
  # Markdownlint configuration for Markdown
  enabled: true
  rules:
    MD001: true  # Heading levels should only increment by one level at a time
    MD003: { style: "consistent" }  # Heading style
    MD004: { style: "consistent" }  # Unordered list style
    MD005: true  # Inconsistent indentation for list items at the same level
    MD007: { indent: 2 }  # Unordered list indentation
    MD009: { br_spaces: 2 }  # Trailing spaces
    MD010: true  # Hard tabs
    MD011: true  # Reversed link syntax
    MD012: { maximum: 1 }  # Multiple consecutive blank lines
    MD013: { line_length: 120 }  # Line length
    MD014: true  # Dollar signs used before commands without showing output
    MD018: true  # No space after hash on atx style heading
    MD019: true  # Multiple spaces after hash on atx style heading
    MD022: true  # Headings should be surrounded by blank lines
    MD023: true  # Headings must start at the beginning of the line
    MD024: { allow_different_nesting: true }  # Multiple headings with the same content
    MD025: true  # Multiple top-level headings in the same document
    MD026: { punctuation: ".,;:!" }  # Trailing punctuation in heading
    MD027: true  # Multiple spaces after blockquote symbol
    MD028: true  # Blank line inside blockquote
    MD029: { style: "ordered" }  # Ordered list item prefix
    MD030: true  # Spaces after list markers
    MD031: true  # Fenced code blocks should be surrounded by blank lines
    MD032: true  # Lists should be surrounded by blank lines
    MD033: { allowed_elements: ["br", "img", "details", "summary"] }  # Allow some HTML elements
    MD034: true  # Bare URL used
    MD035: { style: "consistent" }  # Horizontal rule style
    MD036: false  # Emphasis used instead of a heading
    MD037: true  # Spaces inside emphasis markers
    MD038: true  # Spaces inside code span elements
    MD039: true  # Spaces inside link text
    MD040: true  # Fenced code blocks should have a language specified
    MD041: true  # First line in a file should be a top-level heading
    MD046: { style: "consistent" }  # Code block style
    MD047: true  # Files should end with a single newline character
    MD048: { style: "consistent" }  # Code fence style
  extensions:
    - .md
    - .markdown
    - .mdx

patterns:
  # Define specific patterns to include or exclude
  include:
    - "security/*"
    - "performance/*"
    - "code-style/*"
    - "complexity/*"
    - "duplication/*"
  exclude:
    - "deprecated/*"
    - "legacy/*"

tools:
  # Enable specific tools for .NET analysis
  checkstyle: true
  detekt: true
  markdownlint: true

# Quality gates configuration
quality_settings:
  coverage:
    enabled: true
    minimum: 80
  
  complexity:
    enabled: true
    maximum: 10
  
  duplication:
    enabled: true
    maximum: 3