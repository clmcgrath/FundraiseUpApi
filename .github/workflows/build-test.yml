name: Build and Test

on:
  push:
    branches: [ main, dev, beta ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build (${{ matrix.dotnet-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '8.0.x']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v1.1.1
      with:
        versionSpec: '5.x'

    - name: Calculate Version
      uses: gittools/actions/gitversion/execute@v1.1.1
      id: gitversion

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        dotnet build \
          --configuration Release \
          --no-restore \
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:ContinuousIntegrationBuild=true

    - name: Create NuGet package
      run: |
        dotnet pack \
          --configuration Release \
          --no-build \
          --output ./packages \
          -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}

    - name: Validate multi-target framework builds
      run: |
        echo "Verifying all target framework build outputs..."
        ls -la src/FundraiseUp.Client/bin/Release/netstandard2.0/ || echo "❌ netstandard2.0 output not found"
        ls -la src/FundraiseUp.Client/bin/Release/net6.0/ || echo "❌ net6.0 output not found"
        ls -la src/FundraiseUp.Client/bin/Release/net8.0/ || echo "❌ net8.0 output not found"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}
        path: |
          src/*/bin/Release/
          tests/*/bin/Release/
          packages/*.nupkg

  test:
    name: Test (${{ matrix.display-name }})
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
            display-name: '.NET 6.0'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
            display-name: '.NET 8.0'
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}

    - name: Run tests for ${{ matrix.display-name }}
      run: |
        dotnet test \
          --configuration Release \
          --no-build \
          --framework ${{ matrix.test-framework }} \
          --verbosity minimal \
          --logger "console;verbosity=detailed"
