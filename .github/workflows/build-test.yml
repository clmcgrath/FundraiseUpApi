name: Build and Test

on:
  workflow_dispatch:
  workflow_call:
    # Allow this workflow to be called by other workflows

# Required permissions for test reporting and PR comments
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: '🏗️ Build ${{ matrix.dotnet-version }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '8.0.x']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.1.0
      with:
        versionSpec: '6.4.0'

    - name: Calculate Version
      uses: gittools/actions/gitversion/execute@v4.1.0
      with:
        configFilePath: GitVersion.yml
      id: gitversion
      continue-on-error: false

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        dotnet build \
          --configuration Release \
          --no-restore \
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:ContinuousIntegrationBuild=true

    - name: Create NuGet package
      run: |
        dotnet pack \
          --configuration Release \
          --no-build \
          --output ./packages \
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}


    - name: Validate multi-target framework builds
      run: |
        echo "Verifying target framework build outputs..."
        find src/FundraiseUp.Client/bin/Release -name "*.dll" -o -name "*.exe" | head -10
        echo "Build validation completed"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}
        path: |
          src/*/bin/Release/
          tests/*/bin/Release/
          packages/*.nupkg

  test:
    name: '🧪 Test ${{ matrix.display-name }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
            display-name: '.NET 6.0'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
            display-name: '.NET 8.0'
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}

    - name: Verify build artifacts
      run: |
        echo "Checking downloaded build artifacts..."
        find . -name "*.dll" -path "*/bin/Release/*" | head -5
        ls -la packages/ 2>/dev/null || echo "No packages directory found"

    - name: Run tests for ${{ matrix.display-name }}
      timeout-minutes: 10
      run: |
        echo "Starting test execution for ${{ matrix.display-name }}"
        
        # Create test results directory first
        mkdir -p ./test-results
        
        # Check if runsettings file exists
        if [ -f "coverlet.runsettings" ]; then
          echo "✅ coverlet.runsettings found"
          cat coverlet.runsettings
        else
          echo "❌ coverlet.runsettings not found"
        fi
        
        # Check what coverage collectors are available
        echo "=== Available Data Collectors ==="
        dotnet test --list-tests --verbosity quiet tests/FundraiseUp.Client.Tests/FundraiseUp.Client.Tests.csproj --framework ${{ matrix.test-framework }} || true
        
        # Check installed packages
        echo "=== Installed Packages ==="
        dotnet list tests/FundraiseUp.Client.Tests/FundraiseUp.Client.Tests.csproj package | grep -i cover || echo "No coverage packages found"
        
        # Try coverlet.msbuild approach with explicit paths
        echo "=== Attempting coverage with coverlet.msbuild ==="
        dotnet test tests/FundraiseUp.Client.Tests/FundraiseUp.Client.Tests.csproj \
          --configuration Release \
          --framework ${{ matrix.test-framework }} \
          --verbosity normal \
          --results-directory ./test-results \
          --logger "trx;LogFileName=test-results-${{ matrix.test-framework }}.trx" \
          --no-build \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./test-results/ \
          /p:CoverletOutputName=coverage-${{ matrix.test-framework }}.cobertura \
          '/p:Exclude=[*.Tests]*' \
          '/p:ExcludeByFile=**/bin/**;**/obj/**'
          
        echo "Generated files:"
        ls -la ./test-results/
        echo "Coverage files:"
        ls -la ./test-results/*.xml 2>/dev/null || echo "No XML coverage files found"
        echo "TRX files:"
        ls -la ./test-results/*.trx 2>/dev/null || echo "No TRX files found"
        
        echo "Looking for coverage files in subdirectories:"
        find ./test-results -name "*.xml" -type f 2>/dev/null || echo "No coverage XML files found"
        
        # XPlat Code Coverage creates files in GUID subdirectories, let's find and copy them
        echo "Searching for Cobertura coverage files:"
        coverage_file=$(find ./test-results -name "coverage.cobertura.xml" -type f | head -1)
        if [ ! -z "$coverage_file" ]; then
          echo "Found coverage file: $coverage_file"
          cp "$coverage_file" "./test-results/coverage-${{ matrix.test-framework }}.cobertura.xml"
          echo "Copied to: ./test-results/coverage-${{ matrix.test-framework }}.cobertura.xml"
        else
          echo "❌ No coverage.cobertura.xml file found"
        fi
        
        echo "Final coverage files:"
        ls -la ./test-results/coverage-*.xml 2>/dev/null || echo "No final coverage files"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: 'Test Results (${{ matrix.display-name }})'
        path: './test-results/test-results-${{ matrix.test-framework }}.trx'
        reporter: 'dotnet-trx'
        fail-on-error: false

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-framework }}
        path: ./test-results/

  # Overall status check for PR requirements
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
    - name: Check build status
      if: needs.build.result != 'success'
      run: |
        echo "❌ Build failed"
        exit 1
        
    - name: Check test status  
      if: needs.test.result != 'success'
      run: |
        echo "❌ Tests failed"
        exit 1
        
    - name: All checks passed
      run: |
        echo "✅ All builds and tests passed successfully!"
        echo "🚀 Ready for merge"

  # Upload coverage to Codacy (internal PRs and workflow calls only to avoid secret access issues)
  codacy-coverage:
    name: Upload Coverage to Codacy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    if: github.event_name == 'workflow_call' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: ./test-results/
          merge-multiple: true
      
      - name: List available artifacts (debug)
        run: |
          echo "Available artifacts in current run:"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | "\(.name): \(.size_in_bytes) bytes"'
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: Debug coverage files
        run: |
          echo "=== Full directory structure ==="
          find ./test-results -type f | sort
          echo ""
          echo "=== Looking for any coverage files ==="
          find ./test-results -name "*coverage*" -type f || echo "No coverage files found"
          echo ""
          echo "=== Looking for XML files ==="
          find ./test-results -name "*.xml" -type f || echo "No XML files found"
          echo ""
          echo "=== Directory sizes ==="
          du -sh ./test-results/* 2>/dev/null || echo "No subdirectories"
      
      - name: Check secret availability
        run: |
          echo "=== Debugging Secret Access ==="
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Head repo: ${{ github.event.pull_request.head.repo.full_name || 'N/A' }}"
          echo "Base repo: ${{ github.event.pull_request.base.repo.full_name || 'N/A' }}"
          echo "Is fork: ${{ github.event.pull_request.head.repo.fork || 'N/A' }}"
          echo "Actor: ${{ github.actor }}"
          echo "Job: ${{ github.job }}"
          
          # Check if secret exists at all
          echo "Raw secret check: '${{ secrets.CODACY_PROJECT_TOKEN }}'"
          
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "❌ CODACY_PROJECT_TOKEN secret is not available in environment"
          else
            echo "✅ CODACY_PROJECT_TOKEN secret is available in environment"
          fi
          
          # Try direct access
          if [ "${{ secrets.CODACY_PROJECT_TOKEN }}" = "" ]; then
            echo "❌ Direct secret access is empty"
          else
            echo "✅ Direct secret access works (length: ${#DIRECT_TOKEN})"
          fi
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          DIRECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      
      - name: Debug coverage files before upload
        run: |
          echo "=== Coverage File Debug ==="
          echo "Current directory: $(pwd)"
          echo "Looking for coverage files..."
          
          echo "Contents of test-results directory:"
          if [ -d "test-results" ]; then
            ls -la test-results/
          else
            echo "❌ test-results directory does not exist"
          fi
          
          echo "Searching for all coverage files:"
          find . -name "*coverage*" -type f 2>/dev/null || echo "No coverage files found"
          
          echo "Searching for all .xml files:"
          find . -name "*.xml" -type f 2>/dev/null || echo "No XML files found"
          
          echo "Checking specific files Codacy is looking for:"
          for file in "test-results/coverage-net6.0.cobertura.xml" "test-results/coverage-net8.0.cobertura.xml"; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file (size: $(wc -c < "$file") bytes)"
            else
              echo "❌ Missing: $file"
            fi
          done
      
      - name: Upload coverage to Codacy
        if: env.CODACY_PROJECT_TOKEN != ''
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: 'test-results/coverage-net6.0.cobertura.xml,test-results/coverage-net8.0.cobertura.xml'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
