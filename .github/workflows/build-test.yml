name: Build and Test

on:
  pull_request:
    branches: [ master, stable, dev ]
  workflow_dispatch:
  workflow_call:
    # Allow this workflow to be called by other workflows

# Required permissions for test reporting and PR comments
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: '🏗️ Build ${{ matrix.dotnet-version }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '8.0.x']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install GitVersion

      uses: gittools/actions/gitversion/setup@v4.1.0
      with:
        versionSpec: '6.4.0'

    - name: Calculate Version
      uses: gittools/actions/gitversion/execute@v4.1.0
      with:
        configFilePath: GitVersion.yml
      id: gitversion
      continue-on-error: false

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        dotnet build \
          --configuration Release \
          --no-restore \
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:ContinuousIntegrationBuild=true

    - name: Create NuGet package
      run: |
        dotnet pack \
          --configuration Release \
          --no-build \
          --output ./packages \
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}


    - name: Validate multi-target framework builds
      run: |
        echo "Verifying target framework build outputs..."
        find src/FundraiseUp.Client/bin/Release -name "*.dll" -o -name "*.exe" | head -10
        echo "Build validation completed"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}
        path: |
          src/*/bin/Release/
          tests/*/bin/Release/
          packages/*.nupkg

  test:
    name: '🧪 Test ${{ matrix.display-name }}'
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
            display-name: '.NET 6.0'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
            display-name: '.NET 8.0'
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}

    - name: Verify build artifacts
      run: |
        echo "Checking downloaded build artifacts..."
        find . -name "*.dll" -path "*/bin/Release/*" | head -5
        ls -la packages/ 2>/dev/null || echo "No packages directory found"

    - name: Install coverage tools
      run: |
        dotnet tool install -g dotnet-coverage
        dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Run tests for ${{ matrix.display-name }}
      run: |
        echo "Starting test execution for ${{ matrix.display-name }}"
        
        # Run tests with coverage using dotnet-coverage tool
        dotnet-coverage collect \
          --output ./test-results/coverage.cobertura.xml \
          --output-format cobertura \
          "dotnet test tests/FundraiseUp.Client.Tests/FundraiseUp.Client.Tests.csproj \
            --configuration Release \
            --framework ${{ matrix.test-framework }} \
            --verbosity minimal \
            --logger trx;LogFileName=./test-results/test-results.trx \
            --no-build"
        
        echo "=== Test execution completed, checking generated files ==="
        find ./test-results -type f | sort
        echo ""
        echo "=== Looking for coverage files specifically ==="
        find ./test-results -name "*coverage*" -type f || echo "No coverage files found"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: 'Test Results (${{ matrix.display-name }})'
        path: './test-results/test-results.trx'
        reporter: 'dotnet-trx'
        fail-on-error: false

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-framework }}
        path: ./test-results/  # Overall status check for PR requirements
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
    - name: Check build status
      if: needs.build.result != 'success'
      run: |
        echo "❌ Build failed"
        exit 1
        
    - name: Check test status  
      if: needs.test.result != 'success'
      run: |
        echo "❌ Tests failed"
        exit 1
        
    - name: All checks passed
      run: |
        echo "✅ All builds and tests passed successfully!"
        echo "🚀 Ready for merge"

  # Upload coverage to Codacy (internal PRs and workflow calls only to avoid secret access issues)
  codacy-coverage:
    name: Upload Coverage to Codacy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_call' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    
    permissions:
      contents: read
      checks: write
      statuses: write
      pull-requests: write
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: ./test-results/
          merge-multiple: true
      
      - name: Debug coverage files
        run: |
          echo "=== Full directory structure ==="
          find ./test-results -type f | sort
          echo ""
          echo "=== Looking for any coverage files ==="
          find ./test-results -name "*coverage*" -type f || echo "No coverage files found"
          echo ""
          echo "=== Looking for XML files ==="
          find ./test-results -name "*.xml" -type f || echo "No XML files found"
          echo ""
          echo "=== Directory sizes ==="
          du -sh ./test-results/* 2>/dev/null || echo "No subdirectories"
      
      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: './test-results/coverage.cobertura.xml'
