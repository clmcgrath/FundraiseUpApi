name: Build and Test

on:
  push:
    branches: [ main, dev, beta ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
  workflow_call:
    # Allow this workflow to be called by other workflows

# Required permissions for test reporting and PR comments
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: '🏗️ Build ${{ matrix.dotnet-version }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '8.0.x']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install GitVersion

      uses: gittools/actions/gitversion/setup@v4.1.0
      with:
        versionSpec: '6.4.0'

    - name: Calculate Version
      uses: gittools/actions/gitversion/execute@v4.1.0

      id: gitversion

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        dotnet build \
          --configuration Release \
          --no-restore \
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:ContinuousIntegrationBuild=true

    - name: Create NuGet package
      run: |
        dotnet pack \
          --configuration Release \
          --no-build \
          --output ./packages \
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}


    - name: Validate multi-target framework builds
      run: |
        echo "Verifying all target framework build outputs..."
        ls -la src/FundraiseUp.Client/bin/Release/netstandard2.0/ || echo "❌ netstandard2.0 output not found"
        ls -la src/FundraiseUp.Client/bin/Release/net6.0/ || echo "❌ net6.0 output not found"
        ls -la src/FundraiseUp.Client/bin/Release/net8.0/ || echo "❌ net8.0 output not found"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}
        path: |
          src/*/bin/Release/
          tests/*/bin/Release/
          packages/*.nupkg

  test:
    name: '🧪 Test ${{ matrix.display-name }}'
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
            display-name: '.NET 6.0'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
            display-name: '.NET 8.0'
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}

    - name: Run tests for ${{ matrix.display-name }}
      id: run-tests
      run: |
        echo "Running tests for ${{ matrix.display-name }}..."
        dotnet test \
          --configuration Release \
          --no-build \
          --framework ${{ matrix.test-framework }} \
          --verbosity minimal \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./test-results
        
        # Check if tests passed
        if [ $? -eq 0 ]; then
          echo "✅ Tests passed for ${{ matrix.display-name }}"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ Tests failed for ${{ matrix.display-name }}"
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: './test-results/*.trx'
        check_name: 'Test Results (${{ matrix.display-name }})'
        comment_title: 'Test Results for ${{ matrix.display-name }}'

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-framework }}
        path: ./test-results/

  # Overall status check for PR requirements
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
    - name: Check build status
      if: needs.build.result != 'success'
      run: |
        echo "❌ Build failed"
        exit 1
        
    - name: Check test status  
      if: needs.test.result != 'success'
      run: |
        echo "❌ Tests failed"
        exit 1
        
    - name: All checks passed
      run: |
        echo "✅ All builds and tests passed successfully!"
        echo "🚀 Ready for merge"
