name: Build and Test

on:
  workflow_dispatch:
  workflow_call:
    # Allow this workflow to be called by other workflows

# Required permissions for test reporting and PR comments
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: '🏗️ Build ${{ matrix.dotnet-version }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '8.0.x']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.1.0
      with:
        versionSpec: '6.4.0'

    - name: Calculate Version
      uses: gittools/actions/gitversion/execute@v4.1.0
      with:
        configFilePath: GitVersion.yml
      id: gitversion
      continue-on-error: false

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        dotnet build \
          --configuration Release \
          --no-restore \
          -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:ContinuousIntegrationBuild=true

    - name: Create NuGet package
      run: |
        dotnet pack \
          --configuration Release \
          --no-build \
          --output ./packages \
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }}


    - name: Validate multi-target framework builds
      run: |
        echo "Verifying target framework build outputs..."
        find src/FundraiseUp.Client/bin/Release -name "*.dll" -o -name "*.exe" | head -10
        echo "Build validation completed"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}
        path: |
          src/*/bin/Release/
          tests/*/bin/Release/
          packages/*.nupkg

  test:
    name: '🧪 Test ${{ matrix.display-name }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
            display-name: '.NET 6.0'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
            display-name: '.NET 8.0'
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-${{ matrix.dotnet-version }}

    - name: Verify build artifacts
      run: |
        echo "Checking downloaded build artifacts..."
        find . -name "*.dll" -path "*/bin/Release/*" | head -5
        ls -la packages/ 2>/dev/null || echo "No packages directory found"

    - name: Run tests for ${{ matrix.display-name }}
      timeout-minutes: 10
      run: |
        echo "Starting test execution for ${{ matrix.display-name }}"
        
        # Create test results directory and run tests with coverage
        mkdir -p ./test-results
        dotnet test tests/FundraiseUp.Client.Tests/FundraiseUp.Client.Tests.csproj \
          --configuration Release \
          --framework ${{ matrix.test-framework }} \
          --verbosity normal \
          --results-directory ./test-results \
          --logger "trx;LogFileName=test-results-${{ matrix.test-framework }}.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=../../test-results/ \
          /p:CoverletOutputName=coverage-${{ matrix.test-framework }}.cobertura \
          /p:Exclude=[*.Tests]*
          
        # Find and copy coverage file if needed
        coverage_file=$(find ./test-results -name "coverage.cobertura.xml" -type f | head -1)
        if [ ! -z "$coverage_file" ]; then
          cp "$coverage_file" "./test-results/coverage-${{ matrix.test-framework }}.cobertura.xml"
        fi
        ls -la ./test-results/coverage-*.xml 2>/dev/null || echo "No final coverage files"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: 'Test Results (${{ matrix.display-name }})'
        path: './test-results/test-results-${{ matrix.test-framework }}.trx'
        reporter: 'dotnet-trx'
        fail-on-error: false

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-framework }}
        path: ./test-results/

  # Overall status check for PR requirements
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
    - name: Check build status
      if: needs.build.result != 'success'
      run: |
        echo "❌ Build failed"
        exit 1
        
    - name: Check test status  
      if: needs.test.result != 'success'
      run: |
        echo "❌ Tests failed"
        exit 1
        
    - name: All checks passed
      run: |
        echo "✅ All builds and tests passed successfully!"
        echo "🚀 Ready for merge"
