name: CI/CD Pipeline

on:
  push:
    branches: [ master, dev, stable ]
  pull_request:
    branches: [ master, dev, stable ]

env:
  DOTNET_VERSION: '6.0.x'
  DOTNET_STANDARD_VERSION: '2.0'

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.SemVer }}
      assemblySemVer: ${{ steps.gitversion.outputs.AssemblySemVer }}
      nugetVersion: ${{ steps.gitversion.outputs.NuGetVersionV2 }}
      branchName: ${{ steps.gitversion.outputs.BranchName }}
      isRelease: ${{ steps.gitversion.outputs.BranchName == 'master' || steps.gitversion.outputs.BranchName == 'stable' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0.10.2
      with:
        versionSpec: '5.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v0.10.2
      with:
        useConfigFile: true

    - name: Display Version
      run: |
        echo "Version: ${{ steps.gitversion.outputs.SemVer }}"
        echo "Assembly Version: ${{ steps.gitversion.outputs.AssemblySemVer }}"
        echo "NuGet Version: ${{ steps.gitversion.outputs.NuGetVersionV2 }}"
        echo "Branch: ${{ steps.gitversion.outputs.BranchName }}"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=${{ needs.version.outputs.version }} -p:AssemblyVersion=${{ needs.version.outputs.assemblySemVer }}

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Upload coverage reports to Codacy
      uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        coverage-reports: '**/coverage.cobertura.xml'

  package:
    name: Create NuGet Package
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    if: github.event_name == 'push'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Extract Release Notes from CHANGELOG
      id: changelog
      run: |
        # Extract the latest release notes from CHANGELOG.md
        if [ -f "CHANGELOG.md" ]; then
          # Get content between ## [Unreleased] and the next ## section or end of file
          RELEASE_NOTES=$(awk '/## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag && /^###|^####|^\-|^\*/{if(count<20) {print; count++}}' CHANGELOG.md | head -20)
          
          # If no unreleased section, get the latest version section
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES=$(awk '/^## \[[0-9]/{flag=1; next} /^## \[/{if(flag) flag=0} flag && /^###|^####|^\-|^\*/{if(count<20) {print; count++}}' CHANGELOG.md | head -20)
          fi
          
          # Clean up and format for XML
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g' | tr '\n' '|')
          echo "notes=$RELEASE_NOTES" >> $GITHUB_OUTPUT
        else
          echo "notes=- Thread-safe rate limiting with configurable strategies|  - Comprehensive error handling and retry logic|  - Support for all FundraiseUp API endpoints" >> $GITHUB_OUTPUT
        fi

    - name: Update NuSpec Release Notes
      run: |
        # Replace release notes in nuspec file
        RELEASE_NOTES="${{ steps.changelog.outputs.notes }}"
        FORMATTED_NOTES=$(echo "$RELEASE_NOTES" | tr '|' '\n' | sed 's/^/      /')
        
        # Create temporary file with updated release notes
        cat > temp_release_notes.txt << 'EOF'
        $FORMATTED_NOTES
        EOF
        
        # Update the nuspec file
        if [ -f "FundraiseUpApi.nuspec" ]; then
          # Replace the releaseNotes section
          awk '
            /<releaseNotes>/ { 
              print; 
              while ((getline line < "temp_release_notes.txt") > 0) print "      " line;
              while (getline && !/<\/releaseNotes>/) continue;
              print "    </releaseNotes>";
              next 
            } 
            { print }
          ' FundraiseUpApi.nuspec > FundraiseUpApi.nuspec.tmp && mv FundraiseUpApi.nuspec.tmp FundraiseUpApi.nuspec
          rm -f temp_release_notes.txt
        fi

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=${{ needs.version.outputs.version }} -p:AssemblyVersion=${{ needs.version.outputs.assemblySemVer }}

    - name: Pack with NuSpec
      run: |
        # Update version in nuspec
        sed -i "s/\$version\$/${{ needs.version.outputs.nugetVersion }}/g" FundraiseUpApi.nuspec
        
        # Pack using dotnet pack with nuspec file
        dotnet pack --no-build --configuration Release --output ./artifacts -p:NuspecFile=FundraiseUpApi.nuspec -p:PackageVersion=${{ needs.version.outputs.nugetVersion }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg

  publish-prerelease:
    name: Publish Pre-release
    runs-on: ubuntu-latest
    needs: [version, package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: 
      name: development
      url: https://www.nuget.org/packages/FundraiseUpApi/
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Push to GitHub Packages (Pre-release)
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

    - name: Push to NuGet.org (Pre-release)
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [version, package]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stable')
    environment:
      name: production
      url: https://www.nuget.org/packages/FundraiseUpApi/
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Push to GitHub Packages
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

    - name: Push to NuGet.org
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.version.outputs.version }}
        release_name: Release v${{ needs.version.outputs.version }}
        body: |
          ## Changes in v${{ needs.version.outputs.version }}
          
          This release was automatically generated from the ${{ needs.version.outputs.branchName }} branch.
          
          ### NuGet Package
          - [FundraiseUp.Client v${{ needs.version.outputs.nugetVersion }}](https://www.nuget.org/packages/FundraiseUp.Client/${{ needs.version.outputs.nugetVersion }})
          
          ### Installation
          ```bash
          dotnet add package FundraiseUp.Client --version ${{ needs.version.outputs.nugetVersion }}
          ```
        draft: false
        prerelease: ${{ needs.version.outputs.branchName != 'master' }}

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/FundraiseUp.Client.${{ needs.version.outputs.nugetVersion }}.nupkg
        asset_name: FundraiseUp.Client.${{ needs.version.outputs.nugetVersion }}.nupkg
        asset_content_type: application/octet-stream