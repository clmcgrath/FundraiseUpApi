name: Codacy Coverage

on:
  push:
    branches: [ master, stable, dev ]
  pull_request:
    branches: [ master, stable, dev ]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Import build-test workflow for proper build and test execution
  build-and-test:
    uses: ./.github/workflows/build-test.yml

  codacy-coverage:
    name: Upload Coverage to Codacy
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download .NET 6.0 test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-net6.0
          path: ./test-results/
      
      - name: Download .NET 8.0 test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-net8.0
          path: ./test-results/
      
      - name: Debug downloaded files
        run: |
          echo "=== Downloaded files debug ==="
          echo "Looking for files in test-results directory:"
          find ./test-results -type f | sort
          echo ""
          echo "Expected files:"
          echo "- ./test-results/coverage.net6.0.cobertura.xml"
          echo "- ./test-results/coverage.net8.0.cobertura.xml"
          echo ""
          for file in "./test-results/coverage.net6.0.cobertura.xml" "./test-results/coverage.net8.0.cobertura.xml"; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
              ls -la "$file"
            else
              echo "❌ Missing: $file"
            fi
          done
      
      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: './test-results/coverage.net6.0.cobertura.xml, ./test-results/coverage.net8.0.cobertura.xml'
