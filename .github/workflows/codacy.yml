name: Codacy Coverage

on:
  push:
    branches: [ master, stable, dev ]
  pull_request:
    branches: [ master, stable, dev ]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Import build-test workflow for proper build and test execution
  build-and-test:
    uses: ./.github/workflows/build-test.yml

  codacy-coverage:
    name: Upload Coverage to Codacy
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        include:
          - test-framework: 'net6.0'
            dotnet-version: '6.0.x'
          - test-framework: 'net8.0'
            dotnet-version: '8.0.x'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ matrix.test-framework }}
          path: ./test-results/
      
      - name: Debug downloaded files
        run: |
          echo "=== Downloaded files debug ==="
          echo "Looking for files in test-results directory:"
          find ./test-results -type f | sort
          echo ""
          echo "Expected file: ./test-results/coverage.${{ matrix.test-framework }}.cobertura.xml"
          if [ -f "./test-results/coverage.${{ matrix.test-framework }}.cobertura.xml" ]; then
            echo "✅ Coverage file found"
            ls -la "./test-results/coverage.${{ matrix.test-framework }}.cobertura.xml"
          else
            echo "❌ Coverage file not found"
          fi
      
      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: './test-results/coverage.${{ matrix.test-framework }}.cobertura.xml'
