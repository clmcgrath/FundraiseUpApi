# Simple GitHub Flow with semantic versioning
mode: ContinuousDelivery

branches:
  # Production releases - stable versions only
  master:
    increment: Patch
    is-mainline: true
  
  # Development branch - pre-release versions  
  dev:
    tag: 'alpha'
    increment: Minor
  
  # Beta branch - release candidates for testing
  beta:
    regex: ^beta$|^release[/-]
    tag: 'beta'
    increment: Patch
    
  # Feature branches - inherit version from parent
  feature:
    regex: ^features?[/-]
    tag: useBranchName
    increment: Inherit
    
  # Hotfix branches - patch releases
  hotfix:
    regex: ^hotfix[/-]
    increment: Patch