mode: ContinuousDelivery
next-version: 1.0.0
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'
commit-message-incrementing: Enabled

branches:
  master:
    label: ''
    increment: Patch
    regex: ^master$
    is-release-branch: true
    is-main-branch: true
    source-branches: []
    
  stable:
    label: rc
    increment: Patch
    regex: ^stable$
    is-release-branch: true
    source-branches: ['master']
    
  dev:
    label: beta
    increment: Minor
    regex: ^dev$|^develop$
    source-branches: ['master', 'stable']
    
  feature:
    label: alpha
    increment: Minor
    regex: ^feature[/-]
    source-branches: ['dev', 'master', 'stable']
    
  hotfix:
    label: hotfix
    increment: Patch
    regex: ^hotfix[/-]
    source-branches: ['master', 'stable']
    is-release-branch: false
    
  support:
    label: support
    increment: None
    regex: ^support[/-]
    source-branches: ['master', 'stable']
    is-release-branch: false
    
  release:
    label: rc
    increment: None
    regex: ^release[/-]
    source-branches: ['dev']
    is-release-branch: true