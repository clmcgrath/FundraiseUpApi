title: FundraiseUp .NET Client Library
description: A modern, fluent .NET client library for consuming the FundraiseUp API
remote_theme: just-the-docs/just-the-docs

# Just the Docs configuration
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation structure
nav_order: 1
has_children: false
parent: null

# Enable navigation footer
nav_footer_enabled: true

# Custom navigation order
nav_sort: case_insensitive

# GitHub repository
repository: clmcgrath/FundraiseUpApi

# Enable plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Just the Docs theme settings
logo: "/assets/images/logo.png"
favicon_ico: "/assets/images/favicon.ico"

# Footer content
footer_content: "Copyright &copy; 2025 Chris McGrath. Distributed under the <a href=\"https://github.com/clmcgrath/FundraiseUpApi/blob/master/LICENSE\">MIT License</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# GitHub edit link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/clmcgrath/FundraiseUpApi"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# SEO
author: Chris McGrath
twitter:
  username: _DigitalParadox
  card: summary

# Google Analytics (optional)
# google_analytics: UA-XXXXXXXX-X

# Syntax highlighting
highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge